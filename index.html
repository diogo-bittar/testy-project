<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portal de acesso corporativo TESTY Access">
  <title>TESTY | Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="fundo">
    <main class="cartao">
      <header class="cartao-topo">
        <img src="img/logo.png" alt="Logotipo TESTY" class="logo" width="48" height="48">
        <h1 class="titulo">TESTY <span class="titulo-destaque">Access</span></h1>
        <p class="subtitulo">Entre com sua conta corporativa</p>
      </header>

      <form id="form" class="formulario" novalidate aria-label="Formulário de login" autocomplete="on">
        
        <!-- Bloco de E-mail -->
        <div class="bloco">
          <label for="email" class="rotulo">E-mail</label>
          <div class="campo-box">
            <svg class="icone" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
              <path d="M22 6l-10 7L2 6"/>
              <path d="M2 6h20v12H2z"/>
            </svg>
            <input
              type="email"
              id="email"
              name="email"
              class="campo"
              placeholder="seuemail@testy.com.br"
              autocomplete="email"
              required
              aria-required="true"
              aria-describedby="email-erro"
            >
          </div>
          <span class="erro" id="email-erro" role="alert" aria-live="polite"></span>
        </div>

        <!-- Bloco de Senha -->
        <div class="bloco">
          <label for="senha" class="rotulo">Senha</label>
          <div class="campo-box">
            <svg class="icone" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
              <rect x="3" y="11" width="18" height="10" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input
              type="password"
              id="senha"
              name="senha"
              class="campo"
              placeholder="Sua senha"
              autocomplete="current-password"
              required
              aria-required="true"
              aria-describedby="senha-erro"
            >
            <button
              type="button"
              class="ver-senha"
              id="verSenhaBtn"
              aria-label="Mostrar senha"
              aria-pressed="false"
              aria-controls="senha"
            >
              <!-- O JavaScript vai gerenciar o SVG interno deste botão -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="erro" id="senha-erro" role="alert" aria-live="polite"></span>
        </div>

        <button type="submit" class="botao botao-principal" id="entrarBtn">
          Entrar
        </button>
      </form>
    </main>
  </div>
</body>
</html>
